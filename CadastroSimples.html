<html>
    <head>
        <title>Cadastro simples</title>
    </head>
    <body>
        <h1>Cadastro simples</h1>
         <form method="POST" action="envioCadastro.php">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required><br><br>

            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required><br><br>

            <label for="Data de nascimento">Data de nascimento:</label>
            <input type="date" id="Data de nascimento" name="Data de nascimento" required><br><br>

            <label for="genero">Gênero:</label>
            <select id="genero" name="genero" required>
                <option value="">Selecione</option>
                <option value="masculino">Masculino</option>
                <option value="feminino">Feminino</option>
                <option value="outro">Outro</option>
            </select><br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required><br><br>

            <label for="senha">Senha:</label>
            <input type="password" id="senha" name="senha" required><br><br>

            <label for ="confirmar_senha">Confirmar senha:</label>
            <input type="password" id="confirmar_senha" name="confirmar_senha" required><br><br>|aaaaaaaaaaaaaaaaaaaaa

            <input type="submit" value="Cadastrar">
        </form>
    </body>
</html>
